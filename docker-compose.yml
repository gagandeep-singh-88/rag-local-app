services:
  # ----------------------------------------
  # SERVICE 1: The LangGraph Data Pipeline
  # ----------------------------------------
  cfo-pipeline:
    build: .
    container_name: local_cfo_pipeline
    command: python main.py
    volumes:
      # Mount the host data folder to the container
      - ./data:/data
    environment:
      # CRITICAL: host.docker.internal tells the container to look outside 
      # itself and find Ollama running on your main computer's CPU
      - OLLAMA_HOST=http://host.docker.internal:11434

  # ----------------------------------------
  # SERVICE 2: The Streamlit Chat UI
  # ----------------------------------------
  cfo-ui:
    build: .
    container_name: local_cfo_ui
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      # Expose the Streamlit port to your web browser
      - "8501:8501"
    volumes:
      # Mount the EXACT SAME data folder so Streamlit can read the database!
      - ./data:/data
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    depends_on:
      # Ensure the pipeline container starts first
      cfo-pipeline:
        condition: service_completed_successfully